<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">cubepi social preview</title>
  <desc id="desc">Social preview for cubepi, a Pythonic async-native agent framework.</desc>
  <defs>
    <style>
      .ink { fill: #050608; }
      .muted { fill: #52525b; }
      .line { stroke: #e4e4e7; }
      .accent { fill: #3042d5; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfd"/>
      <stop offset="100%" stop-color="#eef0f5"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1e7fc"/>
      <stop offset="100%" stop-color="#c7d1f6"/>
    </linearGradient>
    <radialGradient id="accentBlob" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c7d1f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c7d1f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotgrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#d6d6dd"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#dotgrid)" opacity="0.45"/>

  <!-- right-side wave: deeper, gradient layered -->
  <path d="M1032 0h248v640h-160c-52-72-78-156-78-252 0-92 20-181-10-388Z" fill="url(#waveGrad)"/>
  <path d="M1090 0h190v580h-110c-40-58-60-128-60-208 0-78 12-150-20-372Z" fill="#c7d1f6" opacity="0.55"/>
  <circle cx="1180" cy="120" r="160" fill="url(#accentBlob)"/>

  <!-- subtle floating accents -->
  <rect x="74" y="68" width="14" height="14" rx="3" fill="#3042d5" opacity="0.14"/>
  <rect x="50" y="558" width="22" height="22" rx="5" fill="#3042d5" opacity="0.10" transform="rotate(18 61 569)"/>
  <rect x="980" y="48" width="10" height="10" rx="2" fill="#3042d5" opacity="0.18"/>
  <circle cx="500" cy="80" r="4" fill="#3042d5" opacity="0.18"/>
  <circle cx="180" cy="540" r="3" fill="#3042d5" opacity="0.22"/>

  <path d="M0 552h1280" class="line" stroke-width="1" opacity="0.7"/>

  <g transform="translate(120 101) scale(.78)">
    <path class="ink" d="M261 117 L396 183 L244 252 L120 183 Z"/>
    <path class="ink" d="M115 198 L232 263 L232 432 L115 365 Z"/>
    <path class="ink" d="M355 346 L397 365 L397 376 L252 446 L247 442 L247 395 Z"/>
    <rect class="accent" x="287" y="268" width="26" height="74" rx="12"/>
    <rect class="accent" x="351" y="247" width="26" height="76" rx="12"/>
  </g>

  <g transform="translate(552 222)">
    <text x="0" y="0" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="96" font-weight="700" fill="#050608">CubePi</text>
    <text x="4" y="68" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="31" font-weight="400" fill="#52525b">Pythonic async-native agent framework</text>
    <g transform="translate(4 120)">
      <path d="M0 0h536" class="line" stroke-width="1"/>
      <path d="M0 56h148M196 56h148M392 56h148" stroke="#050608" stroke-width="10" stroke-linecap="round"/>
      <rect x="164" y="43" width="18" height="26" rx="6" class="accent"/>
      <rect x="360" y="43" width="18" height="26" rx="6" class="accent"/>
    </g>
  </g>
</svg>