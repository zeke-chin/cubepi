name: docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'cubepi/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'cubepi/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: website/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v7
        with: { python-version: '3.11' }
      - name: Install Python deps
        run: uv sync --frozen --extra docs
      - name: Install website deps
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Guard against hand-edited API mdx
        run: |
          if find website/docs/api -type f -name 'cubepi-*.mdx' 2>/dev/null | grep .; then
            echo "::error::Generated API MDX files were committed. Delete them." && exit 1
          fi
      - name: Build (runs griffe via prebuild)
        working-directory: website
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: pnpm build
      - name: Run vitest suite
        working-directory: website
        run: pnpm test
      - name: Upload artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: website-build
          path: website/build/
          if-no-files-found: error

  deploy-cloudflare:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: website-build
          path: website/build/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: cubepi
          directory: website/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
